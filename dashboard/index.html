<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Integrador Woo - SaaS Dashboard</title>

<style>
body {
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #e2e8f0;
    font-family: Arial;
    padding: 20px;
}

h1 { color: #38bdf8; }

button {
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    color: #fff;
    border-radius: 6px;
    font-weight: bold;
}

.btn-run { background: #22c55e; }
.btn-stop { background: #ef4444; }

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px #00000040;
}

.big {
    font-size: 22px;
    font-weight: bold;
}

.green { color: #22c55e; }
.yellow { color: #facc15; }
.red { color: #ef4444; }

.progress {
    background: #020617;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-bar {
    height: 20px;
    background: #22c55e;
    width: 0%;
    transition: 0.5s;
}

pre {
    background: #020617;
    padding: 10px;
    height: 320px;
    overflow: auto;
    border-radius: 8px;
}
</style>

</head>
<body>

<h1>🚀 Integrador Woo - SaaS Dashboard</h1>

<button class="btn-run" onclick="executar()">🔄 Executar</button>
<button class="btn-stop" onclick="parar()">🛑 Parar</button>

<div class="grid">

<div class="card">
<h3>Status</h3>
<div id="status" class="big"></div>
<p>Modo: <span id="modo"></span></p>
</div>

<div class="card">
<h3>Progresso</h3>
<div id="percent" class="big">0%</div>
<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>
</div>

<div class="card">
<h3>Produtos</h3>
<p>Total: <span id="total"></span></p>
<p>Processados: <span id="processados"></span></p>
<p>Atualizados: <span id="atualizados"></span></p>
<p>Criados: <span id="criados"></span></p>
</div>

<div class="card">
<h3>Fila</h3>
<div id="fila" class="big"></div>
</div>

<div class="card">
<h3>Erros</h3>
<div id="erros" class="big">0</div>
</div>

</div>

<div class="card">
<h3>⏱ Tempo execução</h3>
<div id="tempo" class="big">0s</div>
</div>

<div class="card">
<h3>📜 Logs em tempo real</h3>
<pre id="logs"></pre>
</div>

<div class="card">
<h3>⚡ Performance</h3>
<p>Velocidade: <span id="velocidade">0</span> prod/s</p>
<p>Tempo restante: <span id="restante">0</span>s</p>
</div>

<script>

let inicio = null

async function atualizar() {

    try {

        let status = await fetch('/status').then(r => r.json())

        // STATUS
        let statusTxt = document.getElementById('status')

        if (status.rodando) {
            statusTxt.innerHTML = "⏳ Rodando"
            statusTxt.className = "big yellow"

            if (!inicio) inicio = Date.now()
        } else {
            statusTxt.innerHTML = "✅ Parado"
            statusTxt.className = "big green"
            inicio = null
        }

        // MODO
        document.getElementById('modo').innerText = status.modo || "auto"

        // DADOS
        document.getElementById('total').innerText = status.total || 0
        document.getElementById('processados').innerText = status.processados || 0
        document.getElementById('atualizados').innerText = status.atualizados || 0
        document.getElementById('criados').innerText = status.criados || 0
        document.getElementById('fila').innerText = status.fila || 0
        document.getElementById('velocidade').innerText = status.velocidade || 0
        document.getElementById('restante').innerText = status.tempo_restante || 0

        // ERROS COM COR
        let erros = status.erros || 0
        let elErro = document.getElementById('erros')

        elErro.innerText = erros
        elErro.className = erros > 0 ? "big red" : "big green"

        // PROGRESSO REAL
        let total = status.total || 0
        let feitos = status.processados || 0

        let percent = total > 0 ? Math.floor((feitos / total) * 100) : 0

        document.getElementById('percent').innerText = percent + "%"
        document.getElementById('barra').style.width = percent + "%"

        // TEMPO
        if (inicio) {
            let tempo = Math.floor((Date.now() - inicio) / 1000)
            document.getElementById('tempo').innerText = tempo + "s"
        }

        // LOGS
        let logs = await fetch('/logs').then(r => r.json())

        let el = document.getElementById('logs')
        el.innerText = logs.join("\n")
        el.scrollTop = el.scrollHeight

    } catch(e) {
        console.log("erro", e)
    }
}

function executar() {
    inicio = Date.now()
    fetch('/executar')
}

function parar() {
    fetch('/parar')
}

setInterval(atualizar, 2000)

</script>

</body>
</html>
